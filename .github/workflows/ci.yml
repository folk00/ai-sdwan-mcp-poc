name: CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  TERRAFORM_VERSION: "1.7.5"

jobs:
  pipeline-plan:
    name: 00 - Pipeline plan
    runs-on: ubuntu-latest
    steps:
      - name: Explain pipeline
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          # AI SD-WAN MCP PoC CI/CD

          This workflow is intentionally public-safe. It does not contact Cisco,
          AWS, CML, VPNs, or any private lab.

          Flow:

          ```text
          plan
            -> install
              -> tests
              -> MCP tool smoke
              -> OpenAPI smoke
              -> Terraform fmt/validate
                -> summary
          ```
          EOF

  install:
    name: 01 - Install dependencies
    runs-on: ubuntu-latest
    needs: pipeline-plan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m pip freeze | tee pip-freeze.txt
      - name: Compile public PoC files
        run: |
          python -m py_compile \
            backend/app.py \
            backend/automation_engine.py \
            mcp_server/sdwan_tools_example.py \
            mcp_server/tool_catalog.py \
            scripts/print_tool_catalog.py
      - uses: actions/upload-artifact@v4
        with:
          name: python-install-freeze
          path: pip-freeze.txt

  unit-tests:
    name: 02 - Unit tests
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: |
          python -m unittest discover -s tests -t . -v

  mcp-tool-smoke:
    name: 03 - MCP tool smoke
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Print MCP tool catalog
        run: |
          python scripts/print_tool_catalog.py | tee mcp-tool-catalog.json
      - name: Exercise MCP backing engine
        run: |
          python - <<'PY'
          from backend.automation_engine import create_and_onboard_edge, diagnose_edge

          plan = create_and_onboard_edge("CI_AutomationSite", approve=False, dry_run=True)
          assert plan["status"] == "dry_run"
          assert plan["plan"]["target"]["system_ip"] == "10.0.0.4"

          diag = diagnose_edge("Edge1")
          assert diag["postchecks"]["status"] == "pass_with_warnings"
          print("MCP backing engine smoke passed")
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: mcp-tool-catalog
          path: mcp-tool-catalog.json

  openapi-smoke:
    name: 04 - FastAPI/OpenAPI smoke
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Validate OpenAPI tool names
        run: |
          python - <<'PY'
          from backend.app import app

          spec = app.openapi()
          ops = {
              method["operationId"]
              for path in spec["paths"].values()
              for method in path.values()
              if isinstance(method, dict) and "operationId" in method
          }
          assert "sdwanCreateAndOnboardEdge" in ops
          assert "sdwanDiagnoseEdge" in ops
          assert "sdwanListDevices" in ops
          print("OpenAPI operations:", sorted(ops))
          PY

  terraform-validate:
    name: 05 - Terraform fmt/validate
    runs-on: ubuntu-latest
    needs: pipeline-plan
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - name: Terraform fmt
        working-directory: terraform
        run: terraform fmt -check -diff
      - name: Terraform init
        working-directory: terraform
        run: terraform init -backend=false
      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

  pipeline-summary:
    name: 06 - Pipeline summary
    runs-on: ubuntu-latest
    needs:
      - unit-tests
      - mcp-tool-smoke
      - openapi-smoke
      - terraform-validate
    if: always()
    steps:
      - name: Summarize result
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          # Pipeline result

          Completed public-safe checks:

          - Python install and compile
          - Unit tests
          - MCP tool catalog smoke
          - FastAPI/OpenAPI operation validation
          - Terraform format and validate

          This pipeline does not require secrets and does not mutate cloud or
          network resources.
          EOF
